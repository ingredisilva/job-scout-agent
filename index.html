<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Scout Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0F172A;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --primary: #3B82F6;
            --primary-hover: #2563EB;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --accent: #8B5CF6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 30px;
            overflow-y: scroll;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Glassmorphism Header */
        header {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .header-title h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, #60A5FA, #A78BFA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .header-title p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Controls & Logs */
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn:disabled {
            background-color: #334155;
            color: #64748B;
            cursor: not-allowed;
            transform: none;
        }

        .btn-accent {
            background-color: var(--accent);
        }
        .btn-accent:hover {
            background-color: #7C3AED;
        }

        /* Live Terminal Logs */
        .logs-section {
            background: #020617;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 30px;
            overflow: hidden;
            display: none;
        }

        .logs-header {
            background: #1E293B;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
        }

        .logs-terminal {
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            height: 250px;
            overflow-y: auto;
            color: #38BDF8;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .stat-card .label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        /* Main Workspace: Filter & Jobs */
        .main-workspace {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 250px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary);
        }

        .filter-select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        /* Jobs Table / Cards */
        .jobs-table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 16px 20px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            vertical-align: middle;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .score-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 12px;
            text-align: center;
        }

        .score-high {
            background-color: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .score-medium {
            background-color: rgba(245, 158, 11, 0.15);
            color: var(--warning);
        }

        .score-low {
            background-color: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        .job-title {
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
        }

        .job-meta {
            display: flex;
            gap: 10px;
            color: var(--text-muted);
            font-size: 12px;
            align-items: center;
        }

        .workplace-badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            background-color: #334155;
            color: #E2E8F0;
        }

        .status-select {
            background: #1E293B;
            color: white;
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }

        .actions-cell {
            display: flex;
            gap: 10px;
        }

        .action-icon-btn {
            background: #334155;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .action-icon-btn:hover {
            background-color: #475569;
        }

        .action-icon-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border-left-color: white;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <header>
        <div class="header-title">
            <h1>Job Scout Dashboard</h1>
            <p>React / Node.js Local Job Hunting pipeline control center</p>
        </div>
        <div style="display: flex; gap: 15px;">
            <button id="runBtn" class="btn" onclick="startJobScout()">
                <svg style="width:18px;height:18px;fill:currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                Run Job Scout
            </button>
        </div>
    </header>

    <!-- Console Logs -->
    <section id="logsSection" class="logs-section">
        <div class="logs-header">
            <span>Terminal Output Logs</span>
            <span id="terminalStatus" style="color: var(--warning)">Running...</span>
        </div>
        <div id="logsTerminal" class="logs-terminal"></div>
    </section>

    <!-- Stats Grid -->
    <div class="stats-grid">
        <div class="stat-card" style="border-left: 4px solid var(--primary)">
            <div class="label">Total Scored</div>
            <div id="statTotal" class="value">0</div>
        </div>
        <div class="stat-card" style="border-left: 4px solid var(--warning)">
            <div class="label">Review Manual</div>
            <div id="statManual" class="value">0</div>
        </div>
        <div class="stat-card" style="border-left: 4px solid var(--success)">
            <div class="label">Applied</div>
            <div id="statApplied" class="value">0</div>
        </div>
        <div class="stat-card" style="border-left: 4px solid var(--text-muted)">
            <div class="label">Not Applied</div>
            <div id="statNotApplied" class="value">0</div>
        </div>
    </div>

    <!-- Main Table -->
    <main class="main-workspace">
        <div class="filter-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="Search by Job title, Company, or Location..." oninput="filterJobs()">
            <select id="statusFilter" class="filter-select" onchange="filterJobs()">
                <option value="ALL">All Statuses</option>
                <option value="Not Applied">Not Applied</option>
                <option value="Applied">Applied</option>
                <option value="Review Manual">Review Manual</option>
            </select>
            <select id="workplaceFilter" class="filter-select" onchange="filterJobs()">
                <option value="ALL">All Types</option>
                <option value="remote">Remote Only</option>
                <option value="hybrid">Hybrid Only</option>
                <option value="on-site">On-site Only</option>
            </select>
        </div>

        <div class="jobs-table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 80px;">Score</th>
                        <th>Opportunity Details</th>
                        <th>Location</th>
                        <th style="width: 150px;">Status</th>
                        <th style="width: 120px;">Actions</th>
                    </tr>
                </thead>
                <tbody id="jobsList">
                    <!-- Dynamic rendering -->
                </tbody>
            </table>
        </div>
    </main>
</div>

<script>
    let allJobs = [];
    let logInterval = null;

    window.addEventListener('DOMContentLoaded', () => {
        fetchJobs();
        checkLogsStatus();
    });

    function fetchJobs() {
        fetch('/api/jobs')
            .then(res => res.json())
            .then(data => {
                if (data.jobs) {
                    allJobs = data.jobs;
                    renderJobs(allJobs);
                    updateStats(allJobs);
                } else if (data.message) {
                    document.getElementById('jobsList').innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 40px;">${data.message}</td></tr>`;
                }
            })
            .catch(err => {
                console.error("Error fetching jobs:", err);
                document.getElementById('jobsList').innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--danger); padding: 40px;">Failed to connect to local server.</td></tr>`;
            });
    }

    function renderJobs(jobs) {
        const tbody = document.getElementById('jobsList');
        if (jobs.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 40px;">No opportunities match the criteria.</td></tr>`;
            return;
        }

        tbody.innerHTML = jobs.map(job => {
            const score = parseFloat(job.Score) || 0;
            let scoreClass = 'score-low';
            if (score >= 70) scoreClass = 'score-high';
            else if (score >= 50) scoreClass = 'score-medium';

            const workplace = (job.workplaceType || (job.Remote === 'Yes' ? 'remote' : 'hybrid')).toLowerCase();

            return `
                <tr>
                    <td>
                        <span class="score-badge ${scoreClass}">${job.Score}/100</span>
                    </td>
                    <td>
                        <div class="job-title">${job['Job Title']}</div>
                        <div class="job-meta">
                            <span style="font-weight: 500; color: var(--text-main)">${job.Company}</span>
                            <span>•</span>
                            <span class="workplace-badge">${workplace}</span>
                            <span>•</span>
                            <span>Found: ${job['Date Found']}</span>
                        </div>
                    </td>
                    <td>
                        <div style="font-weight: 500;">${job.Remote === 'Yes' ? 'Remote (Worldwide)' : (job.Location || 'Brazil')}</div>
                        <div style="font-size: 12px; color: var(--text-muted)">${job.Location || 'Not specified'}</div>
                    </td>
                    <td>
                        <select class="status-select" onchange="updateJobStatus('${job.Company}', '${job['Job Title']}', this.value)">
                            <option value="Not Applied" ${job.Status === 'Not Applied' ? 'selected' : ''}>Not Applied</option>
                            <option value="Applied" ${job.Status === 'Applied' ? 'selected' : ''}>Applied</option>
                            <option value="Review Manual" ${job.Status === 'Review Manual' ? 'selected' : ''}>Review Manual</option>
                        </select>
                    </td>
                    <td>
                        <div class="actions-cell">
                            <!-- Link to apply -->
                            <a href="${job['Apply Link']}" target="_blank" class="action-icon-btn" title="Open Job Application Link">
                                <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
                            </a>
                            <!-- Open local folder -->
                            <button class="action-icon-btn" title="Open local tailored CV folder" onclick="openJobFolder('${job['Date Found']}', '${job.Folder}')">
                                <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-1 11H5V8h14v9z"/></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function updateStats(jobs) {
        document.getElementById('statTotal').innerText = jobs.length;
        document.getElementById('statManual').innerText = jobs.filter(j => j.Status === 'Review Manual').length;
        document.getElementById('statApplied').innerText = jobs.filter(j => j.Status === 'Applied').length;
        document.getElementById('statNotApplied').innerText = jobs.filter(j => j.Status === 'Not Applied').length;
    }

    function filterJobs() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const status = document.getElementById('statusFilter').value;
        const workplace = document.getElementById('workplaceFilter').value;

        const filtered = allJobs.filter(job => {
            const matchesQuery = job['Job Title'].toLowerCase().includes(query) || 
                                 job.Company.toLowerCase().includes(query) || 
                                 (job.Location && job.Location.toLowerCase().includes(query));
            
            const matchesStatus = status === 'ALL' || job.Status === status;
            
            const jobWorkplace = (job.workplaceType || (job.Remote === 'Yes' ? 'remote' : 'hybrid')).toLowerCase();
            const matchesWorkplace = workplace === 'ALL' || jobWorkplace.includes(workplace);

            return matchesQuery && matchesStatus && matchesWorkplace;
        });

        renderJobs(filtered);
    }

    function updateJobStatus(company, title, newStatus) {
        fetch('/api/update-status', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ company, title, status: newStatus })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                // Update local state directly to prevent full list refresh layout jumps
                const job = allJobs.find(j => j.Company === company && j['Job Title'] === title);
                if (job) job.Status = newStatus;
                updateStats(allJobs);
                filterJobs();
            }
        })
        .catch(err => console.error("Error updating status:", err));
    }

    function openJobFolder(date, folder) {
        fetch('/api/open-folder', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ date, folder })
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                alert(data.error);
            }
        })
        .catch(err => console.error("Error opening folder:", err));
    }

    function startJobScout() {
        const btn = document.getElementById('runBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Running...';
        
        document.getElementById('logsSection').style.display = 'block';
        document.getElementById('logsTerminal').innerText = 'Initializing scraper...';
        
        fetch('/api/run', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                startPollingLogs();
            })
            .catch(err => {
                console.error("Error starting scraper:", err);
                btn.disabled = false;
                btn.innerHTML = 'Run Job Scout';
            });
    }

    function startPollingLogs() {
        if (logInterval) clearInterval(logInterval);
        
        logInterval = setInterval(() => {
            fetch('/api/logs')
                .then(res => res.json())
                .then(data => {
                    const terminal = document.getElementById('logsTerminal');
                    terminal.innerText = data.logs || 'Connecting to process...';
                    terminal.scrollTop = terminal.scrollHeight; // Auto-scroll
                    
                    if (!data.running) {
                        clearInterval(logInterval);
                        logInterval = null;
                        
                        const btn = document.getElementById('runBtn');
                        btn.disabled = false;
                        btn.innerHTML = '<svg style="width:18px;height:18px;fill:currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Run Job Scout';
                        
                        document.getElementById('terminalStatus').innerText = 'Completed';
                        document.getElementById('terminalStatus').style.color = 'var(--success)';
                        
                        // Reload jobs to show the new ones fetched
                        fetchJobs();
                    }
                })
                .catch(err => console.error("Error polling logs:", err));
        }, 1000);
    }

    function checkLogsStatus() {
        fetch('/api/logs')
            .then(res => res.json())
            .then(data => {
                if (data.running) {
                    document.getElementById('logsSection').style.display = 'block';
                    const btn = document.getElementById('runBtn');
                    btn.disabled = true;
                    btn.innerHTML = '<span class="spinner"></span> Running...';
                    startPollingLogs();
                }
            })
            .catch(err => console.error("Error checking logs status:", err));
    }
</script>

</body>
</html>
